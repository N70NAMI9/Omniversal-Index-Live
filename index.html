<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N7 // 0x00A1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            background-color: #000; color: #00ffcc;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 1px, rgba(0, 255, 204, 0.05) 1px, transparent 2px);
            background-size: 100% 3px;
        }

        .matrix-container {
            width: 90%; max-width: 1100px;
            border: 1px solid #111; padding: 40px; background: rgba(5, 5, 5, 0.95);
            position: relative; box-shadow: 0 0 40px #000;
        }

        /* Top Bar - Encrypted Identity */
        .top-bar {
            font-size: 0.6rem; letter-spacing: 5px; color: #333;
            border-bottom: 1px solid #111; padding-bottom: 10px; margin-bottom: 30px;
            display: flex; justify-content: space-between;
        }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        /* Visual Frame */
        .visual-frame {
            border: 1px solid #111; background: #020202; position: relative;
            min-height: 300px; display: flex; align-items: center; justify-content: center;
        }
        .visual-frame img { width: 100%; height: auto; opacity: 0.8; filter: grayscale(1) contrast(1.2); }
        .corner-tag { position: absolute; top: 10px; left: 10px; font-size: 0.5rem; color: #00ffcc; background: #000; padding: 2px 8px; }

        /* Data Stream */
        .data-stream { display: flex; flex-direction: column; justify-content: space-between; }
        
        /* THE SECRET CODES (Stealth Labels) */
        .hex-header { font-size: 1.5rem; color: #fff; margin: 0; letter-spacing: 3px; }
        .status-bits { font-size: 0.65rem; color: #444; margin-bottom: 20px; }
        
        .payload-text { 
            font-size: 0.9rem; line-height: 1.8; color: #888; 
            padding: 15px; border-left: 2px solid #222; background: rgba(255,255,255,0.02);
        }

        .btn-stealth {
            display: inline-block; margin-top: 30px; padding: 12px 25px;
            border: 1px solid #222; color: #555; text-decoration: none;
            font-size: 0.65rem; letter-spacing: 4px; transition: 0.3s;
        }
        .btn-stealth:hover { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.05); }

        #loading { font-size: 0.8rem; letter-spacing: 10px; color: #00ffcc; }
    </style>
</head>
<body>

    <div id="loading">RUNNING_N7_BOOT_SEQUENCE...</div>

    <div class="matrix-container" id="main-ui" style="display: none;">
        <div class="top-bar">
            <span>ID: 0xN7_OMNI</span>
            <span id="ts">ANCHOR: --:--:--</span>
        </div>

        <div class="main-grid">
            <div class="visual-frame">
                <div class="corner-tag">S_OPTIC_v.1.0</div>
                <img id="m-img" src="" alt="">
            </div>

            <div class="data-stream">
                <div>
                    <h2 class="hex-header">0x7F_KLYG</h2>
                    <div class="status-bits">STATUS: [ 1011001 ] // ACTIVE_NODE: 0x01</div>
                    
                    <div class="payload-text" id="m-text">DECRYPTING_STREAM...</div>
                </div>
                
                <a href="#" id="m-link" class="btn-stealth">>> EXEC_0x_LINK <<</a>
            </div>
        </div>
    </div>

    <script>
        function syncMatrix() {
            fetch('matrix_data.json?' + new Date().getTime())
                .then(r => r.json())
                .then(d => {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'block';
                    
                    document.getElementById('ts').innerText = "0x_T: " + d.sync_time;
                    
                    // STEALTH ERROR MASKING
                    let content = d.logistics_data;
                    if (content.includes("ERROR") || content.includes("OFFLINE") || content.includes("404")) {
                        document.getElementById('m-text').innerHTML = "<span style='color:#500;'>CRITICAL_ERR: 0x00404 <br> SIGNAL_LOST_IN_TRANSMISSION</span>";
                    } else {
                        document.getElementById('m-text').innerText = content;
                    }

                    if (d.visual_asset && d.visual_asset !== "N/A") {
                        document.getElementById('m-img').src = d.visual_asset;
                    }
                    document.getElementById('m-link').href = d.source_radar;
                })
                .catch(e => {
                    document.getElementById('loading').innerText = "CONNECTION_REFUSED_BY_HOST";
                });
        }
        syncMatrix();
    </script>
</body>
</html>
