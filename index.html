<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N7 MATRIX // IMDb ELITE</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --imdb-yellow: #F5DE50;
            --imdb-dark: #000000;
            --imdb-surface: #121212;
            --imdb-surface-light: #1A1A1A;
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--imdb-dark); color: var(--text-main); overflow-x: hidden; }

        /* --- Header --- */
        header { background-color: var(--imdb-surface); padding: 15px 5%; display: flex; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .logo { background-color: var(--imdb-yellow); color: var(--imdb-dark); font-family: 'Syncopate', sans-serif; font-weight: 700; padding: 5px 12px; border-radius: 4px; font-size: 1.5rem; letter-spacing: -1px; margin-right: 15px; }

        /* --- Hero Slider --- */
        .hero-section { width: 100%; height: 75vh; position: relative; }
        .swiper { width: 100%; height: 100%; }
        .swiper-slide { background-position: center; background-size: cover; position: relative; }
        
        .hero-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; background: linear-gradient(to top, var(--imdb-dark) 0%, rgba(0,0,0,0.8) 50%, transparent 100%); display: flex; align-items: flex-end; padding: 50px 5%; }
        .hero-content { display: flex; gap: 30px; align-items: flex-end; width: 100%; max-width: 1200px; margin: 0 auto; }
        
        .hero-poster { width: 200px; border-radius: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.9); border: 1px solid #333; display: none; }
        @media (min-width: 768px) { .hero-poster { display: block; } }

        .hero-text h2 { font-size: 3.5rem; font-weight: 800; margin-bottom: 15px; line-height: 1.1; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .hero-trailer-btn { background-color: rgba(255, 255, 255, 0.1); color: white; border: 2px solid white; padding: 12px 24px; font-size: 1.1rem; font-weight: 600; cursor: pointer; border-radius: 4px; display: inline-flex; align-items: center; gap: 10px; transition: all 0.3s; backdrop-filter: blur(5px); }
        .hero-trailer-btn:hover { background-color: var(--imdb-yellow); color: var(--imdb-dark); border-color: var(--imdb-yellow); }

        /* --- Grid System --- */
        .content-section { padding: 50px 5%; max-width: 1400px; margin: 0 auto; }
        .section-title { color: var(--imdb-yellow); font-size: 1.8rem; margin-bottom: 30px; border-left: 5px solid var(--imdb-yellow); padding-left: 15px; }
        
        .movie-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 25px; }
        .movie-card { background-color: var(--imdb-surface-light); border-radius: 6px; overflow: hidden; cursor: pointer; transition: transform 0.3s; }
        .movie-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.8); z-index: 10; }
        
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .movie-info { padding: 15px; }
        .rating { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 5px; }
        .star { color: var(--imdb-yellow); font-size: 1.1rem; margin-right: 5px; }
        .movie-info h3 { font-size: 1.1rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Elite Modal (Deep Dive) --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.95); z-index: 1000; overflow-y: auto; padding: 40px 5%; }
        .modal-content { background-color: var(--imdb-surface); max-width: 1000px; margin: 0 auto; padding: 40px; border-radius: 8px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 30px; color: var(--text-muted); font-size: 2.5rem; cursor: pointer; transition: color 0.2s; }
        .close-btn:hover { color: white; }
        
        .trailer-container { position: relative; width: 100%; padding-bottom: 56.25%; margin-bottom: 30px; background-color: #000; border-radius: 6px; overflow: hidden; }
        .trailer-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .modal-title { font-size: 3rem; font-weight: 800; margin-bottom: 20px; }
        .cast-box { background: var(--imdb-surface-light); padding: 20px; border-left: 4px solid var(--imdb-yellow); margin-bottom: 30px; }
        .cast-box h4 { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; margin-bottom: 5px; }
        .cast-box p { font-size: 1.1rem; margin-bottom: 15px; }
        
        .modal-article h3 { color: var(--imdb-yellow); font-size: 1.5rem; margin: 30px 0 15px; }
        .modal-article p { font-size: 1.1rem; line-height: 1.8; color: #E0E0E0; margin-bottom: 20px; }
        .modal-article ul { margin-left: 20px; color: #E0E0E0; font-size: 1.1rem; line-height: 1.8; margin-bottom: 20px; }

        @media (max-width: 768px) { .hero-text h2 { font-size: 2rem; } .modal-title { font-size: 2rem; } .modal-content { padding: 20px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">N7</div>
        <div style="font-size: 1.2rem; font-weight: 600; letter-spacing: 1px;">OMNIVERSAL HUB</div>
    </header>

    <div class="hero-section">
        <div class="swiper heroSwiper">
            <div class="swiper-wrapper" id="hero-wrapper"></div>
        </div>
    </div>

    <div class="content-section">
        <h2 class="section-title">Deep Technical Archives</h2>
        <div class="movie-grid" id="grid-wrapper"></div>
    </div>

    <div class="modal" id="article-modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="trailer-container" id="modal-trailer"></div>
            <h1 class="modal-title" id="modal-title"></h1>
            <div class="cast-box" id="modal-cast-crew"></div>
            <div class="modal-article" id="modal-article"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        // ==========================================
        // SYSTEM BOOT (PURA DHYAN YAHAN LAGA BHAI!)
        // ==========================================
        
        const SHEET_ID = '13LAiMhG_73QdOTbHA6D9sASr0vjEqS7QzTgEtqpbSlc'; // Apni lambi wali Sheet ID yahan daal
        const API_KEY = 'AIzaSyBZVIqZQ1nIHqIHqaUIASgPc8X96UI_1zg';   // Abhi jo API key copy ki hai wo yahan daal
        
        const SHEET_RANGE = 'Sheet1!A:I';
        const API_URL = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${SHEET_RANGE}?key=${API_KEY}`;

        let globalMovieData = [];

        async function fetchVaultData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                // Pura data array mein badlo, pehli line (headers) hata kar
                const rows = data.values.slice(1);
                
                globalMovieData = rows.map(row => ({
                    id: row[0],
                    title: row[1],
                    poster: row[3],
                    backdrop: row[4],
                    trailer: row[5],
                    cast_crew: JSON.parse(row[6] || '{"director":"Unknown","cast":[]}'),
                    article: row[7]
                })).reverse(); // Naya post sabse pehle dikhega
                
                renderUI();
            } catch (error) {
                console.error("Database connection failed:", error);
                document.getElementById('grid-wrapper').innerHTML = "<p style='color:red;'>System Offline. Cannot fetch Matrix Data.</p>";
            }
        }

        function renderUI() {
            const heroWrapper = document.getElementById('hero-wrapper');
            const gridWrapper = document.getElementById('grid-wrapper');
            
            // Hero Slider (Top 5 movies)
            const topMovies = globalMovieData.slice(0, 5);
            topMovies.forEach((movie, index) => {
                heroWrapper.insertAdjacentHTML('beforeend', `
                    <div class="swiper-slide" style="background-image: url('${movie.backdrop}');">
                        <div class="hero-overlay">
                            <div class="hero-content">
                                <img src="${movie.poster}" class="hero-poster" alt="${movie.title}">
                                <div class="hero-text">
                                    <h2>${movie.title}</h2>
                                    <button class="hero-trailer-btn" onclick="openModal(${index})">▶ Enter The Matrix</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `);
            });

            new Swiper('.heroSwiper', { loop: true, autoplay: { delay: 5000 }, effect: 'fade' });

            // Movie Grid Layout
            globalMovieData.forEach((movie, index) => {
                const fakeRating = (Math.random() * (9.8 - 8.0) + 8.0).toFixed(1);
                gridWrapper.insertAdjacentHTML('beforeend', `
                    <div class="movie-card" onclick="openModal(${index})">
                        <img loading="lazy" src="${movie.poster}" alt="${movie.title}">
                        <div class="movie-info">
                            <div class="rating"><span class="star">★</span> ${fakeRating}</div>
                            <h3>${movie.title}</h3>
                        </div>
                    </div>
                `);
            });
        }

        function openModal(index) {
            const movie = globalMovieData[index];
            document.getElementById('modal-title').innerText = movie.title;
            document.getElementById('modal-article').innerHTML = movie.article;
            
            document.getElementById('modal-cast-crew').innerHTML = `
                <h4>Director</h4><p>${movie.cast_crew.director}</p>
                <h4>Top Cast</h4><p>${movie.cast_crew.cast.join(', ')}</p>
            `;
            
            document.getElementById('modal-trailer').innerHTML = `<iframe src="https://www.youtube.com/embed/${movie.trailer}?autoplay=1&controls=1&modestbranding=1" allow="autoplay; fullscreen"></iframe>`;
            
            document.getElementById('article-modal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('article-modal').style.display = 'none';
            document.getElementById('modal-trailer').innerHTML = ''; // Rok de video
            document.body.style.overflow = 'auto';
        }

        fetchVaultData();
    </script>
</body>
</html>
