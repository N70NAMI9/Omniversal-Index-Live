<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N7 MATRIX // CLASSIFIED INTEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon: #00ffcc;
            --bg-deep: #030303;
            --card-bg: rgba(10, 10, 12, 0.85);
            --border-dim: #1a1a1a;
        }

        /* Tactical Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon); }

        body {
            margin: 0; padding: 2rem; 
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #b0b0b0; 
            font-family: 'Share Tech Mono', monospace; 
            line-height: 1.7;
            position: relative;
        }

        /* CRT Scanline Overlay */
        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999; background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        header {
            text-align: center; margin-bottom: 4rem;
            animation: glitch-fade 2s ease-in-out;
        }

        h1 {
            color: #fff; font-size: 3rem; margin: 0; text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon), 0 0 20px var(--neon);
            letter-spacing: 2px; border-bottom: 1px solid var(--neon); padding-bottom: 10px;
            display: inline-block;
        }

        .status-bar {
            color: var(--neon); font-size: 0.9rem; margin-top: 10px; font-weight: bold;
            letter-spacing: 1px;
        }

        #matrix-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(600px, 1fr)); gap: 3rem;
            max-width: 1400px; margin: 0 auto;
        }

        .intel-card {
            background: var(--card-bg); border: 1px solid var(--border-dim);
            border-top: 4px solid var(--neon); padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .intel-card:hover {
            border-color: #333; border-top-color: var(--neon);
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 255, 204, 0.1);
        }

        /* Image Container with perfect aspect ratio */
        .img-container {
            width: 100%; height: 350px; overflow: hidden; margin-bottom: 2rem;
            border: 1px solid #333; position: relative; background: #000;
        }

        .intel-card img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(100%) contrast(1.2) brightness(0.8);
            transition: filter 0.5s ease;
        }

        .intel-card:hover img { filter: grayscale(30%) contrast(1.1) brightness(1); }

        /* Typography */
        .intel-title {
            color: var(--neon); font-size: 1.5rem; text-transform: uppercase; 
            margin: 0 0 1rem 0; letter-spacing: 1px;
        }

        .intel-meta {
            font-size: 0.75rem; color: #555; margin-bottom: 2rem;
            border-bottom: 1px solid #222; padding-bottom: 1rem;
            display: flex; justify-content: space-between;
        }

        .intel-content { font-size: 1rem; white-space: pre-wrap; text-align: justify; }

        /* The Magic Markdown Highlighter */
        .highlight {
            color: #fff; font-weight: bold; text-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
        }

        .tags-container { margin-top: 2.5rem; display: flex; flex-wrap: wrap; gap: 0.8rem; }
        .tag {
            background: rgba(0, 255, 204, 0.05); color: var(--neon);
            padding: 0.4rem 0.8rem; font-size: 0.75rem; font-weight: bold;
            border: 1px solid rgba(0, 255, 204, 0.3); text-transform: uppercase;
            transition: all 0.2s ease; cursor: crosshair;
        }
        .tag:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        @keyframes glitch-fade {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            #matrix-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>N7 MATRIX CORE</h1>
        <div class="status-bar">>>> UPLINK SECURE // AUTHORIZATION LEVEL: OMEGA // KALYUG PROTOCOL ACTIVE</div>
    </header>

    <main id="matrix-grid"></main>

    <script>
        async function loadIntelligence() {
            try {
                const response = await fetch('matrix_data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Data stream unavailable.");
                
                const data = await response.json();
                const grid = document.getElementById('matrix-grid');

                data.reverse().forEach(entry => {
                    const card = document.createElement('article');
                    card.className = 'intel-card';
                    
                    // Tags logic
                    const tagsHtml = (entry.category_tags || []).map(tag => `<span class="tag">${tag}</span>`).join('');
                    
                    // THE MAGIC: Convert AI's **bold** text into glowing HTML spans!
                    let formattedContent = entry.content.replace(/\*\*(.*?)\*\*/g, '<span class="highlight">$1</span>');

                    // Default Encrypted Image fallback if Pollinations AI fails
                    const fallbackImg = "https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=1920&auto=format&fit=crop";

                    card.innerHTML = `
                        <div class="img-container">
                            <img src="${entry.image_url}" alt="Kalyug Asset" 
                                 onerror="this.onerror=null; this.src='${fallbackImg}'; this.style.filter='grayscale(100%) contrast(1.5) sepia(100%) hue-rotate(130deg)';" loading="lazy" />
                        </div>
                        <h2 class="intel-title">${entry.title}</h2>
                        <div class="intel-meta">
                            <span>ID: ${entry.id.substring(0,12)}</span>
                            <span>TS: ${entry.timestamp}</span>
                        </div>
                        <div class="intel-content">${formattedContent}</div>
                        <div class="tags-container">${tagsHtml}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                document.getElementById('matrix-grid').innerHTML = `<p style="color: #ff003c; text-align: center; font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 10px #ff003c;">[!] CRITICAL SYSTEM FAILURE: UNABLE TO ESTABLISH UPLINK.</p>`;
            }
        }
        document.addEventListener('DOMContentLoaded', loadIntelligence);
    </script>
</body>
</html>
