<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N7 // OMNIVERSAL ARCHIVE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        
        body {
            background-color: #030303; color: #00ffcc;
            font-family: 'Share Tech Mono', monospace;
            margin: 0; padding: 40px;
            background-image: radial-gradient(rgba(0, 255, 204, 0.05) 1.5px, transparent 1.5px);
            background-size: 25px 25px;
        }
        
        .header {
            border-bottom: 2px solid #00ffcc; padding-bottom: 20px; margin-bottom: 40px;
            text-transform: uppercase; text-shadow: 0 0 10px rgba(0,255,204,0.4);
        }
        
        /* The Math-driven Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 30px;
        }
        
        .data-card {
            background: #060606; border: 1px solid #111;
            border-left: 3px solid #00ffcc; padding: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        
        .card-meta { font-size: 0.75rem; color: #555; margin-bottom: 15px; border-bottom: 1px dashed #222; padding-bottom: 10px;}
        .card-title { font-size: 1.3rem; margin-bottom: 20px; color: #fff; letter-spacing: 2px;}
        
        .card-content {
            font-size: 0.9rem; color: #888; line-height: 1.8;
            height: 250px; overflow-y: auto; margin-bottom: 20px;
            white-space: pre-wrap; padding-right: 10px;
        }
        
        /* Custom Scrollbar for Content Box */
        .card-content::-webkit-scrollbar { width: 5px; }
        .card-content::-webkit-scrollbar-thumb { background: #00ffcc; }
        
        .btn {
            display: inline-block; border: 1px solid rgba(0,255,204,0.3);
            color: #00ffcc; text-decoration: none; font-size: 0.7rem; letter-spacing: 3px;
            padding: 10px 20px; text-transform: uppercase; background: transparent;
        }
        .btn:hover { background: rgba(0,255,204,0.1); }
        
        #loading { font-size: 1.5rem; letter-spacing: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="header">
        <h1>N7 // DECOUPLED ARCHIVE MATRIX</h1>
    </div>

    <div id="loading">FETCHING SECURE DATA ARRAY...</div>
    
    <div class="grid-container" id="matrix-grid"></div>

    <script>
        fetch('matrix_data.json?' + new Date().getTime())
            .then(res => res.json())
            .then(dataArray => {
                document.getElementById('loading').style.display = 'none';
                const grid = document.getElementById('matrix-grid');
                
                // Ensure the backend successfully created an array
                if(Array.isArray(dataArray)) {
                    // Reverse to show the newest generated article first
                    dataArray.reverse().forEach(entry => {
                        
                        // Handle potential 404 strings injected by the python error block
                        let contentDisplay = entry.content;
                        if(contentDisplay.includes("ERROR 404")) {
                            contentDisplay = `<span style="color:#ff003c;">${contentDisplay}</span>`;
                        }

                        // Build the card HTML dynamically
                        const cardHTML = `
                            <div class="data-card">
                                <div class="card-meta">ID: ${entry.id} | SYNC: ${entry.timestamp} <br> ${entry.category}</div>
                                <div class="card-title">${entry.title}</div>
                                <div class="card-content">${contentDisplay}</div>
                                <a href="${entry.source_radar}" target="_blank" class="btn">>> DECRYPT RADAR SOURCE <<</a>
                            </div>
                        `;
                        grid.insertAdjacentHTML('beforeend', cardHTML);
                    });
                } else {
                    // Fallback if data is corrupt
                    grid.innerHTML = `<h2 style="color:#ff003c;">ERROR: DATABASE IS NOT AN ARRAY.</h2>`;
                }
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = `<span style="color:#ff003c;">CRITICAL FAILURE: MATRIX JSON NOT FOUND.</span>`;
            });
    </script>
</body>
</html>
