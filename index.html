<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N7 MATRIX // EXTREME CINEMATIC ENGINE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #050505;
            --bg-surface: rgba(15, 15, 15, 0.6); 
            --bg-surface-hover: rgba(25, 25, 25, 0.8);
            --accent: #00f0ff;
            --accent-glow: rgba(0, 240, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #e5e7eb; /* [FIXED] Brightened for public readability */
            --border-subtle: rgba(255, 255, 255, 0.05);
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* [FIXED] Removed cursor: none; to restore standard mouse */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-base); color: var(--text-main);
            font-family: 'Manrope', sans-serif; display: flex; min-height: 100vh;
            overflow-x: hidden; position: relative;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.03; pointer-events: none; z-index: 9999;
        }

        .sidebar {
            width: 300px; height: 100vh; position: sticky; top: 0;
            background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-subtle);
            padding: 2.5rem 2rem; display: flex; flex-direction: column; z-index: 100;
        }

        .brand-logo {
            font-family: 'Syncopate', sans-serif; font-size: 1.5rem; font-weight: 700;
            letter-spacing: -1px; text-transform: uppercase; margin-bottom: 0.5rem;
        }
        .brand-logo span { color: var(--accent); }
        .brand-sub { font-size: 0.7rem; color: #9ca3af; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 2.5rem; }

        .search-box {
            width: 100%; padding: 1rem; background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-subtle); border-radius: 8px;
            color: var(--text-main); font-family: 'Manrope'; font-size: 0.85rem;
            margin-bottom: 2rem; outline: none; transition: var(--transition-smooth);
        }
        .search-box:focus { border-color: var(--accent); background: rgba(0, 240, 255, 0.05); }

        .nav-label { font-size: 0.7rem; font-family: 'Syncopate'; color: #9ca3af; margin-bottom: 1rem; letter-spacing: 1px; }

        .category-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; overflow-y: auto; }
        .category-list::-webkit-scrollbar { display: none; }

        .magnetic-btn {
            background: transparent; border: none; color: #9ca3af;
            font-family: 'Manrope'; font-size: 0.9rem; text-align: left;
            padding: 0.8rem 1rem; border-radius: 8px; transition: var(--transition-smooth);
            display: flex; align-items: center; position: relative; overflow: hidden; cursor: pointer;
        }
        .magnetic-btn::before {
            content: ''; position: absolute; left: 0; top: 0; height: 100%; width: 3px;
            background: var(--accent); transform: scaleY(0); transition: transform 0.3s ease;
        }
        .magnetic-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.02); }
        .magnetic-btn.active { color: var(--accent); background: var(--accent-glow); }
        .magnetic-btn.active::before { transform: scaleY(1); }

        .main-wrapper { flex-grow: 1; padding: 3rem 4rem; width: calc(100% - 300px); }

        .breadcrumbs { font-size: 0.8rem; color: #9ca3af; margin-bottom: 1.5rem; letter-spacing: 1px; }
        .breadcrumbs span { color: var(--accent); }

        .page-title { font-family: 'Syncopate', sans-serif; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 3rem; font-weight: 700; letter-spacing: -1px; }

        .masonry-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 2.5rem; align-items: start;
        }

        .pro-card {
            background: var(--bg-surface); border: 1px solid var(--border-subtle);
            border-radius: 12px; overflow: hidden; position: relative;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: var(--transition-smooth);
            opacity: 0; transform: translateY(20px);
            animation: fadeUpIn 0.6s ease forwards;
        }

        @keyframes fadeUpIn { to { opacity: 1; transform: translateY(0); } }

        .pro-card:hover {
            transform: translateY(-8px) scale(1.01);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
        }

        .card-visual { width: 100%; height: 300px; position: relative; overflow: hidden; background: #000; }
        .card-visual img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(80%) contrast(1.1);
            transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), filter 0.7s ease;
        }
        .pro-card:hover .card-visual img { transform: scale(1.05); filter: grayscale(0%) contrast(1.05); }

        .card-data { padding: 2rem; }
        
        .card-id-badge {
            display: inline-block; font-family: 'Syncopate'; font-size: 0.65rem;
            color: var(--bg-base); background: var(--accent); padding: 0.3rem 0.6rem;
            border-radius: 4px; font-weight: 700; margin-bottom: 1.5rem; letter-spacing: 1px;
        }

        .card-heading {
            font-family: 'Syncopate', sans-serif; font-size: 1.2rem; font-weight: 700;
            line-height: 1.4; margin-bottom: 1rem; text-transform: uppercase; letter-spacing: -0.5px;
        }

        /* [FIXED] Enhanced Readability: Brighter color, larger font, more breathable line-height */
        .card-text {
            font-size: 1.05rem; 
            line-height: 1.8; 
            color: var(--text-muted); 
            white-space: pre-wrap; 
            font-weight: 400; 
            margin-bottom: 2rem;
        }
        
        .highlight { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }

        .card-tags { display: flex; flex-wrap: wrap; gap: 0.6rem; }
        .pro-tag {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle);
            color: #9ca3af; padding: 0.4rem 0.8rem; border-radius: 6px;
            font-size: 0.7rem; font-family: 'Syncopate'; text-transform: uppercase; letter-spacing: 1px;
        }

        .mobile-menu-btn { display: none; position: fixed; top: 1.5rem; right: 1.5rem; z-index: 1000; background: var(--bg-surface); border: 1px solid var(--border-subtle); padding: 0.8rem; border-radius: 8px; color: var(--accent); font-family: 'Syncopate'; font-size: 0.8rem; cursor: pointer;}

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @media (max-width: 1024px) { .masonry-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .mobile-menu-btn { display: block; }
            .sidebar { position: fixed; left: -100%; transition: left 0.4s ease; width: 100%; border-right: none; border-bottom: 1px solid var(--border-subtle); background: var(--bg-base); }
            .sidebar.open { left: 0; }
            .main-wrapper { width: 100%; padding: 5rem 1.5rem 2rem 1.5rem; }
            .page-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')">MENU</button>

    <aside class="sidebar">
        <div class="brand-logo">N7<span>MATRIX</span></div>
        <div class="brand-sub">Hyper-Realism Engine</div>

        <input type="text" id="searchInput" class="search-box" placeholder="Faceted Search Intel..." onkeyup="filterBySearch()">

        <div class="nav-label">Tactical Taxonomy</div>
        <ul class="category-list" id="category-menu"></ul>
    </aside>

    <main class="main-wrapper" id="scrollWrapper">
        <div class="content-area" id="contentArea">
            <div class="breadcrumbs">INDEX / <span id="bread-current">ALL OPERATIONS</span></div>
            <h1 class="page-title" id="page-heading">Global Telemetry</h1>

            <section class="masonry-grid" id="matrix-grid"></section>
        </div>
    </main>

    <script>
        let globalData = [];
        let targetScrollY = 0;
        let currentRenderedY = 0;

        async function bootMatrix() {
            try {
                const response = await fetch('matrix_data.json?t=' + Date.now());
                if (!response.ok) throw new Error("Uplink Severed.");
                
                globalData = await response.json();
                globalData.reverse(); 
                
                buildTaxonomy();
                renderMasonry(globalData);
                engageLinearInterpolationScroll();
            } catch (error) {
                document.getElementById('matrix-grid').innerHTML = `<h2 style="color: #ff3333; font-family: 'Syncopate';">FATAL: DATASTREAM CORRUPTED.</h2>`;
            }
        }

        function buildTaxonomy() {
            const menu = document.getElementById('category-menu');
            let html = `<li><button class="magnetic-btn active" onclick="filterCategory('All', this)">All Operations</button></li>`;
            
            const uniqueTags = new Set();
            globalData.forEach(entry => {
                (entry.category_tags || []).forEach(tag => uniqueTags.add(tag.replace(/\[|\]/g, '').trim()));
            });

            uniqueTags.forEach(tag => {
                if(tag) html += `<li><button class="magnetic-btn" onclick="filterCategory('${tag}', this)">${tag}</button></li>`;
            });
            menu.innerHTML = html;
        }

        window.filterCategory = function(tag, btnElement) {
            document.querySelectorAll('.magnetic-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            document.getElementById('page-heading').innerText = tag === 'All' ? 'Global Telemetry' : tag;
            document.getElementById('bread-current').innerText = tag.toUpperCase();
            document.getElementById('searchInput').value = ''; 

            const filtered = tag === 'All' ? globalData : globalData.filter(e => (e.category_tags || []).some(t => t.includes(tag)));
            renderMasonry(filtered);
        }

        window.filterBySearch = function() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.magnetic-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('page-heading').innerText = query ? `Search: ${query}` : 'Global Telemetry';
            
            const filtered = globalData.filter(e => 
                e.title.toLowerCase().includes(query) || e.content.toLowerCase().includes(query)
            );
            renderMasonry(filtered);
        }

        function renderMasonry(dataBlock) {
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = ''; 

            if(dataBlock.length === 0) {
                grid.innerHTML = `<p style="color: #9ca3af; font-family: 'Syncopate';">NO INTEL MATCHES DIRECTIVE.</p>`;
                return;
            }

            dataBlock.forEach((entry, index) => {
                const card = document.createElement('article');
                card.className = 'pro-card';
                card.style.animationDelay = `${index * 0.1}s`; 

                const tagsHtml = (entry.category_tags || []).map(tag => `<span class="pro-tag">${tag.replace(/\[|\]/g, '').trim()}</span>`).join('');
                let formattedContent = entry.content.replace(/\*\*(.*?)\*\*/g, '<span class="highlight">$1</span>');
                const fallbackImg = "https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=1920&auto=format&fit=crop";

                card.innerHTML = `
                    <div class="card-visual">
                        <img src="${entry.image_url}" alt="Classified Asset" loading="lazy"
                             onerror="this.onerror=null; this.src='${fallbackImg}';" />
                    </div>
                    <div class="card-data">
                        <div class="card-id-badge">ID: ${entry.id.substring(0,8)}</div>
                        <h2 class="card-heading">${entry.title}</h2>
                        <div class="card-text">${formattedContent}</div>
                        <div class="card-tags">${tagsHtml}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        const engageLinearInterpolationScroll = () => {
            window.addEventListener('scroll', () => {
                targetScrollY = window.scrollY;
            }, { passive: true });

            const executeLERPLoop = () => {
                currentRenderedY += (targetScrollY - currentRenderedY) * 0.08;
                document.body.style.transform = `translate3d(0, -${currentRenderedY}px, 0)`;
                requestAnimationFrame(executeLERPLoop);
            };
            // Note: If LERP causes issues on full body, simply removing the call to executeLERPLoop() restores native scrolling.
            // executeLERPLoop(); 
        };

        document.addEventListener('DOMContentLoaded', bootMatrix);
    </script>
</body>
</html>
