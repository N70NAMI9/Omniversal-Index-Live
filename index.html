<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N7 MATRIX // PREMIUM DATABASE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #09090b;
            --bg-surface: #18181b;
            --bg-surface-hover: #27272a;
            --accent-cyan: #06b6d4;
            --accent-glow: rgba(6, 182, 212, 0.4);
            --text-primary: #f8fafc;
            --text-secondary: #a1a1aa;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- LEFT SIDEBAR (MULTI-CATEGORY NAVIGATION) --- */
        .sidebar {
            width: 280px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            position: fixed;
            height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .brand {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .brand span { color: var(--accent-cyan); }
        .brand-subtitle { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 3rem; text-transform: uppercase; letter-spacing: 2px;}

        .nav-title {
            font-size: 0.8rem; font-weight: 600; color: var(--text-primary);
            text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 1rem;
        }

        .category-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }

        .category-btn {
            background: transparent; border: none; color: var(--text-secondary);
            font-family: 'Inter', sans-serif; font-size: 0.95rem; text-align: left;
            padding: 0.8rem 1rem; border-radius: 8px; cursor: pointer;
            transition: all 0.2s ease;
            display: flex; justify-content: space-between; align-items: center;
        }

        .category-btn:hover, .category-btn.active {
            background-color: rgba(6, 182, 212, 0.1);
            color: var(--accent-cyan);
        }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            margin-left: 280px;
            padding: 3rem 4rem;
            width: calc(100% - 280px);
        }

        .page-header { margin-bottom: 3rem; }
        .page-title { font-family: 'Rajdhani', sans-serif; font-size: 2.5rem; font-weight: 600; margin-bottom: 0.5rem; }
        .page-desc { color: var(--text-secondary); font-size: 1rem; }

        /* --- MULTI-COLUMN GRID --- */
        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 2.5rem;
        }

        /* --- PREMIUM CARD DESIGN --- */
        .intel-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .intel-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 15px var(--accent-glow);
        }

        .card-img-wrapper {
            width: 100%; height: 280px; overflow: hidden;
            position: relative; background: #000;
        }

        .card-img {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.85; transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .intel-card:hover .card-img { opacity: 1; transform: scale(1.03); }

        .card-body { padding: 2rem; display: flex; flex-direction: column; flex-grow: 1; }

        .card-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem; color: var(--text-secondary);
            margin-bottom: 1rem; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
        }

        .card-title {
            font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700;
            color: var(--text-primary); margin-bottom: 1.5rem; line-height: 1.3;
        }

        /* SUPER READABLE CONTENT TEXT */
        .card-content {
            font-size: 0.95rem; line-height: 1.8; color: var(--text-secondary);
            white-space: pre-wrap; text-align: justify; flex-grow: 1;
            font-weight: 300;
        }

        .highlight { color: #fff; font-weight: 600; color: var(--accent-cyan); }

        .card-tags { margin-top: 2rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
        
        .tag {
            background: rgba(255, 255, 255, 0.05); color: var(--text-primary);
            padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem;
            font-weight: 600; border: 1px solid var(--border-color);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: var(--bg-surface-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-cyan); }

        @media (max-width: 1024px) {
            .grid-layout { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 1px solid var(--border-color); padding: 1.5rem; }
            .main-content { margin-left: 0; width: 100%; padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div>
            <div class="brand">N7<span>MATRIX</span></div>
            <div class="brand-subtitle">Omniversal Intelligence</div>
        </div>
        
        <div class="nav-title">Data Categories</div>
        <ul class="category-list" id="category-menu">
            </ul>
    </aside>

    <main class="main-content">
        <header class="page-header">
            <h1 class="page-title" id="current-category-title">All Operations</h1>
            <p class="page-desc">Classified cinematic blueprints and tactical telemetry.</p>
        </header>

        <section class="grid-layout" id="matrix-grid">
            </section>
    </main>

    <script>
        let globalData = []; // Store data globally for filtering

        async function initDashboard() {
            try {
                // Fetch JSON with Cache Buster
                const response = await fetch('matrix_data.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("Database offline.");
                
                globalData = await response.json();
                globalData.reverse(); // Newest first
                
                extractAndRenderCategories();
                renderCards(globalData, "All Operations");

            } catch (error) {
                document.getElementById('matrix-grid').innerHTML = `<p style="color: #ef4444; font-size: 1.2rem;">CRITICAL ERROR: Failed to sync with the Matrix.</p>`;
            }
        }

        function extractAndRenderCategories() {
            const menu = document.getElementById('category-menu');
            
            // 1. Always add "All" button
            let html = `<li><button class="category-btn active" onclick="filterCategory('All')">All Operations</button></li>`;
            
            // 2. Extract unique tags
            const uniqueTags = new Set();
            globalData.forEach(entry => {
                const tags = entry.category_tags || [];
                tags.forEach(tag => {
                    // Clean tag text (remove brackets if they exist like "[ TAG ]")
                    let cleanTag = tag.replace(/\[|\]/g, '').trim();
                    if(cleanTag) uniqueTags.add(cleanTag);
                });
            });

            // 3. Render tag buttons
            uniqueTags.forEach(tag => {
                html += `<li><button class="category-btn" onclick="filterCategory('${tag}')">${tag}</button></li>`;
            });
            
            menu.innerHTML = html;
        }

        window.filterCategory = function(selectedCategory) {
            // Update Title
            document.getElementById('current-category-title').innerText = selectedCategory === 'All' ? 'All Operations' : selectedCategory;
            
            // Update Active Menu Styling
            const buttons = document.querySelectorAll('.category-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.includes(selectedCategory)) btn.classList.add('active');
            });

            // Filter Data
            if (selectedCategory === 'All') {
                renderCards(globalData);
            } else {
                const filteredData = globalData.filter(entry => {
                    const tags = entry.category_tags || [];
                    return tags.some(t => t.includes(selectedCategory));
                });
                renderCards(filteredData);
            }
        };

        function renderCards(dataToRender) {
            const grid = document.getElementById('matrix-grid');
            grid.innerHTML = ''; // Clear current grid

            if(dataToRender.length === 0) {
                grid.innerHTML = `<p style="color: var(--text-secondary);">No intel found in this category.</p>`;
                return;
            }

            dataToRender.forEach(entry => {
                const card = document.createElement('article');
                card.className = 'intel-card';
                
                // Format Tags
                const tagsHtml = (entry.category_tags || []).map(tag => {
                    let cleanTag = tag.replace(/\[|\]/g, '').trim();
                    return `<span class="tag">${cleanTag}</span>`;
                }).join('');
                
                // Format Markdown Bold (**text** to highlight)
                let formattedContent = entry.content.replace(/\*\*(.*?)\*\*/g, '<span class="highlight">$1</span>');

                const fallbackImg = "https://images.unsplash.com/photo-1618331835717-801e976710b2?q=80&w=1920&auto=format&fit=crop";

                card.innerHTML = `
                    <div class="card-img-wrapper">
                        <img src="${entry.image_url}" class="card-img" alt="Intel Asset" 
                             onerror="this.onerror=null; this.src='${fallbackImg}';" loading="lazy" />
                    </div>
                    <div class="card-body">
                        <div class="card-meta">
                            <span>ID: ${entry.id.substring(0,8)}</span>
                            <span>TS: ${entry.timestamp.substring(0, 10)}</span>
                        </div>
                        <h2 class="card-title">${entry.title}</h2>
                        <div class="card-content">${formattedContent}</div>
                        <div class="card-tags">${tagsHtml}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initialize Engine on load
        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
